<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melbourne Cabs Booking</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
}
.container{
    max-width:450px;
    margin:30px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}
h2{
    text-align:center;
}
input, select, textarea{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:14px;
    background:#000;
    color:#fff;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#333;
}
</style>

</head>

<body>

<div class="container">

<h2>🚖 Melbourne Cabs Booking</h2>

<form action="https://formsubmit.co/your@email.com" method="POST">

<label>Full Name</label>
<input type="text" name="Name" required>

<label>Mobile Number</label>
<input type="tel" name="Phone" required>

<label>Pickup Address</label>
<input type="text" name="Pickup" required>

<label>Destination</label>
<input type="text" name="Destination" required>

<label>Pickup Date & Time</label>
<input type="datetime-local" name="Pickup Time" required>

<label>Vehicle Type</label>
<select name="Vehicle">
<option>Sedan</option>
<option>SUV</option>
<option>Maxi Taxi</option>
<option>Silver Service</option>
<option>Wheelchair Taxi</option>
</select>

<label>Flight Number (Optional)</label>
<input type="text" name="Flight">

<label>Notes</label>
<textarea name="Notes" rows="4"></textarea>

<button type="submit">
Book Taxi
</button>

</form>

</div>

</body>
</html>
